<!doctype html>
<html lang="en" data-theme="gunmetal">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tracker</title>
  <meta name="description" content="Private habit & life command console." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0A0B0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <!-- Fonts: Fraunces (display serif) · Inter (UI) · JetBrains Mono (numerals) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Loading splash -->
  <div id="splash" class="splash">
    <div class="crest crest--lg" aria-hidden="true">R</div>
  </div>

  <!-- App shell (revealed after boot) -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <div class="crest" title="Life Tracker">R</div>
      <div class="topbar__meta">
        <span id="phaseTag" class="eyebrow"></span>
      </div>
      <button id="themeBtn" class="iconbtn" title="Switch theme" aria-label="Switch theme">
        <svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="5"></circle><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"></path></svg>
      </button>
    </header>

    <main id="view" class="view" role="main"><!-- screens render here --></main>

    <nav id="tabbar" class="tabbar" role="navigation" aria-label="Primary">
      <button class="tab" data-route="today"     aria-label="Today">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 8v4l3 2"></path><circle cx="12" cy="12" r="9"></circle></svg>
        <span>Today</span>
      </button>
      <button class="tab" data-route="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
        <span>Dashboard</span>
      </button>
      <button class="tab" data-route="history"   aria-label="History">
        <svg viewBox="0 0 24 24" class="ic"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path><path d="M3 3v5h5"></path><path d="M12 8v4l3 2"></path></svg>
        <span>History</span>
      </button>
      <button class="tab" data-route="review"    aria-label="Weekly review">
        <svg viewBox="0 0 24 24" class="ic"><path d="M4 5h16M4 12h16M4 19h10"></path></svg>
        <span>Review</span>
      </button>
    </nav>
  </div>

  <!-- Supabase JS (UMD) — only used when configured; app is local-first without it -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
